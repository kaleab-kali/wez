services:
  - type: web
    name: wez-investor-demo
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: corepack enable && pnpm install --frozen-lockfile --prod=false && pnpm render:build && pnpm render:db:deploy
    startCommand: pnpm render:start
    initialDeployHook: pnpm render:seed:demo
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    renderSubdomainPolicy: enabled
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_HOST
        value: 0.0.0.0
      - key: SERVE_WEB_APP
        value: "true"
      - key: FRONTEND_DIST_DIR
        value: apps/web/dist
      - key: STORAGE_ROOT
        value: /tmp/wez/uploads
      - key: LOG_LEVEL
        value: info
      - key: SLOW_QUERY_THRESHOLD_MS
        value: "300"
      - key: SMS_PROVIDER
        value: disabled
      - key: EMAIL_PROVIDER
        value: disabled
      - key: BETTER_AUTH_URL
        value: https://wez-investor-demo.onrender.com
      - key: FRONTEND_URL
        value: https://wez-investor-demo.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: wez-investor-demo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: wez-investor-demo-redis
          property: connectionString
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: ADMIN_AUTH_SECRET
        generateValue: true
      - key: SUPER_ADMIN_EMAIL
        value: admin@example.com
      - key: SUPER_ADMIN_NAME
        value: Wez Demo Admin
      - key: SUPER_ADMIN_PASSWORD
        sync: false

  - type: keyvalue
    name: wez-investor-demo-redis
    plan: free
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: wez-investor-demo-db
    databaseName: wez_demo
    user: wez_demo
    plan: free
    region: oregon
    postgresMajorVersion: "16"
    ipAllowList: []
