name: Deploy to VPS

# Disabled: manual trigger only. Re-enable by uncommenting the push block below.
on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.VPS_SSH_KEY }}
          known_hosts: unnecessary

      - name: Add known hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh root@${{ secrets.VPS_HOST }} << 'DEPLOY'
          set -e

          PROJECT=/var/www/wez
          BACKUP_DIR=/var/www/wez-backups
          mkdir -p $BACKUP_DIR

          echo "Backing up database..."
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          source $PROJECT/apps/api/.env
          pg_dump "$DATABASE_URL" --format=custom --file="$BACKUP_DIR/wez_${TIMESTAMP}.dump"
          echo "Backup saved to $BACKUP_DIR/wez_${TIMESTAMP}.dump"

          ls -t $BACKUP_DIR/*.dump 2>/dev/null | tail -n +8 | xargs -r rm --
          echo "Old backups cleaned (keeping last 7)"

          echo "Pulling latest code..."
          cd $PROJECT
          git pull origin main

          echo "Installing dependencies..."
          pnpm install --frozen-lockfile

          echo "Generating Prisma client..."
          pnpm db:generate

          echo "Running migrations..."
          cd $PROJECT/apps/api
          pnpm dlx prisma migrate deploy

          echo "Building..."
          cd $PROJECT
          pnpm build

          echo "Restarting PM2..."
          pm2 reload wez-api --update-env || pm2 start ecosystem.config.cjs --env production
          pm2 save

          echo "Deployment complete!"
          pm2 status
          DEPLOY

      - name: Health Check
        run: |
          sleep 5
          ssh root@${{ secrets.VPS_HOST }} "curl -f http://localhost:3005/health || echo 'API starting...'"
