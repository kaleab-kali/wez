pre-commit:
  parallel: true
  jobs:
    - name: biome check
      glob: "apps/**/*.{js,ts,jsx,tsx,json,css}"
      run: pnpm biome check --write {staged_files} && git add {staged_files}

    - name: typecheck api
      glob: "apps/api/**/*.ts"
      run: pnpm --filter api exec tsc --noEmit

    - name: typecheck web
      glob: "apps/web/**/*.{ts,tsx}"
      run: pnpm --filter web exec tsc --noEmit
